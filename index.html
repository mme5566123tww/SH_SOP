<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>協興傢俱行POS</title>
<style>
  :root{
    --paper:#EDF1F1;
    --card:#FFFFFF;
    --ink:#1D2B2E;
    --ink-soft:#5B6B67;
    --accent:#1F7A5C;
    --accent-dark:#155940;
    --gold:#C9A227;
    --brick:#A8402E;
    --line:#D3DAD6;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
    --disp: -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--disp);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:720px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    padding:18px 16px 12px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:8px;
  }
  header h1{
    font-size:20px;
    font-weight:800;
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin:0;
  }
  header .clock{
    font-family:var(--mono);
    font-size:13px;
    color:var(--ink-soft);
    text-align:right;
  }
  .sync-status{
    font-size:11px;
    text-align:right;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .sync-status.online{ color:var(--accent-dark); font-weight:700; }
  .sync-status.offline{ color:var(--brick); font-weight:700; }
  nav.tabs{
    display:flex;
    gap:5px;
    padding:0 16px 12px;
  }
  nav.tabs button{
    flex:1;
    padding:9px 4px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink-soft);
    font-family:var(--disp);
    font-weight:700;
    font-size:12px;
    letter-spacing:0.02em;
    border-radius:8px;
    cursor:pointer;
    transition:transform .08s ease, background .15s ease, color .15s ease;
  }
  nav.tabs button.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  nav.tabs button:active{ transform:scale(0.96); }

  main{ flex:1; padding:0 16px 40px; }
  .tabpanel{ display:none; }
  .tabpanel.active{ display:block; }

  .section-title{
    font-size:12px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    margin:18px 0 8px;
  }
  .section-title.highlight-title{
    font-size:20px;
    font-weight:800;
    text-transform:none;
    letter-spacing:normal;
    color:var(--gold);
  }
  .section-divider{
    border-top:2px solid var(--ink);
    margin:14px 0;
  }

  /* category chips (cashier tab) */
  .cat-chip-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:4px;
    -webkit-overflow-scrolling:touch;
  }
  .cat-chip{
    flex:0 0 auto;
    padding:8px 14px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease, color .15s ease;
  }
  .cat-chip.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }

  /* item grid (cashier tab) */
  .item-grid{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:10px;
  }
  .item-btn{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 10px;
    text-align:left;
    cursor:pointer;
    transition:transform .08s ease, border-color .15s ease;
  }
  .item-btn:active{ transform:scale(0.96); border-color:var(--accent); }
  .item-btn .name{ font-weight:700; font-size:14px; display:block; margin-bottom:4px; }
  .item-btn .price{ font-family:var(--mono); font-size:13px; color:var(--accent-dark); }
  .empty-hint{
    color:var(--ink-soft);
    font-size:13px;
    padding:16px 4px;
    line-height:1.6;
  }

  /* receipt / cart */
  .receipt{
    background:var(--card);
    border:1px solid var(--line);
    border-top:3px dashed var(--line);
    border-radius:10px 10px 0 0;
    padding:14px 16px 18px;
    margin-top:8px;
  }
  .receipt::after{
    content:"";
    display:block;
    height:12px;
    margin:12px -16px -18px;
    background-image:
      linear-gradient(-45deg, var(--paper) 6px, transparent 0),
      linear-gradient(45deg, var(--paper) 6px, transparent 0);
    background-position:left bottom;
    background-size:12px 12px;
    background-repeat:repeat-x;
  }
  .cart-line{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:13px;
    padding:6px 0;
    border-bottom:1px dotted var(--line);
  }
  .cart-line:last-of-type{ border-bottom:none; }
  .cart-line .cl-name{ flex:1; font-family:var(--disp); font-weight:600; font-size:14px; }
  .qty-ctrl{ display:flex; align-items:center; gap:4px; }
  .qty-ctrl button{
    width:24px; height:24px;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:6px;
    font-size:14px;
    line-height:1;
    cursor:pointer;
  }
  .cl-sub{ width:60px; text-align:right; }
  .cl-remove{
    color:var(--brick);
    cursor:pointer;
    font-size:15px;
    padding:0 2px;
  }
  .cart-empty{ color:var(--ink-soft); font-size:13px; padding:8px 0; }

  textarea#noteInput{
    width:100%;
    resize:vertical;
    min-height:44px;
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    font-family:var(--disp);
    font-size:13px;
    margin-top:10px;
    background:var(--card);
  }

  .option-row{
    display:flex;
    align-items:center;
    gap:18px;
    margin-top:12px;
    flex-wrap:wrap;
  }
  .option-row label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
  }
  .option-row input[type="checkbox"]{
    width:17px; height:17px;
    accent-color:var(--accent);
    cursor:pointer;
  }
  .discount-row input[type="number"]{
    width:110px;
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    font-family:var(--mono);
    font-size:13px;
  }
  .discount-row input[type="number"]:disabled{
    background:var(--paper);
    color:var(--ink-soft);
  }
  #tabExtra{
    margin-top:8px;
    padding:10px 12px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
  }
  #deliveryExtra{ margin-top:6px; }
  .sub-field-row{
    display:flex;
    gap:8px;
    margin-top:8px;
    flex-wrap:wrap;
  }
  .sub-field-row input{
    flex:1;
    min-width:120px;
    padding:7px 9px;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:13px;
  }
  .sub-field-row input[type="number"]{
    flex:0 0 110px;
    font-family:var(--mono);
  }
  .sub-field-row input:disabled{
    background:var(--card);
    color:var(--ink-soft);
  }
  .field-toggle-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:8px;
  }
  .field-toggle-row label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    flex:0 0 auto;
  }
  .field-toggle-row input[type="checkbox"]{
    width:17px; height:17px;
    accent-color:var(--accent);
    cursor:pointer;
  }
  .field-toggle-row input[type="text"]{
    flex:1;
    min-width:0;
    padding:7px 9px;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:13px;
  }
  .field-toggle-row input[type="text"]:disabled{
    background:var(--card);
    color:var(--ink-soft);
  }
  .deposit-row input[type="number"]:disabled{
    background:var(--paper);
    color:var(--ink-soft);
  }
  .deposit-row input[type="checkbox"]:disabled{
    cursor:not-allowed;
    opacity:0.4;
  }
  .deposit-row label:has(input:disabled){
    color:var(--ink-soft);
  }
  .pay-method-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:8px;
  }
  .pay-method-row label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    flex:0 0 auto;
    width:64px;
  }
  .pay-method-row input[type="checkbox"]{
    width:17px; height:17px;
    accent-color:var(--accent);
    cursor:pointer;
  }
  .pay-method-row input[type="checkbox"]:disabled{
    cursor:not-allowed;
    opacity:0.4;
  }
  .pay-method-row label:has(input:disabled){
    color:var(--ink-soft);
  }
  .pay-method-row input[type="number"]{
    flex:1;
    min-width:0;
    padding:7px 9px;
    border:1px solid var(--line);
    border-radius:6px;
    font-family:var(--mono);
    font-size:13px;
  }
  .pay-method-row input[type="number"]:disabled{
    background:var(--paper);
    color:var(--ink-soft);
  }

  .totals{
    margin-top:14px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .total-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:var(--mono);
    gap:10px;
  }
  .total-row.sub span{ color:var(--ink-soft); font-size:13px; }
  .total-row.grand{
    font-size:20px;
    font-weight:800;
    color:var(--gold);
    padding-top:6px;
    border-top:2px solid var(--ink);
  }
  .total-row span.label-text{ font-family:var(--disp); }
  .total-row input{
    width:120px;
    text-align:right;
    font-family:var(--mono);
    font-size:15px;
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:6px;
  }
  .cash-hint{
    font-family:var(--disp);
    font-size:11px;
    color:var(--ink-soft);
    margin-top:-4px;
  }
  .pill{ font-family:var(--mono); font-weight:700; }
  .pill.unpaid{ color:var(--brick); }
  .pill.change{ color:var(--accent-dark); }
  .pill.zero{ color:var(--ink-soft); }

  .actions{
    display:flex;
    gap:8px;
    margin-top:14px;
  }
  button.primary{
    flex:1;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:14px;
    border-radius:9px;
    font-weight:800;
    font-size:15px;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:transform .08s ease, background .15s ease;
  }
  button.primary:disabled{ background:#B7C4BF; cursor:not-allowed; }
  button.primary:active:not(:disabled){ transform:scale(0.98); background:var(--accent-dark); }
  button.ghost{
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--line);
    padding:14px 16px;
    border-radius:9px;
    font-weight:700;
    cursor:pointer;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:24px;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    padding:10px 18px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* item settings tab */
  .item-form{
    display:flex;
    gap:8px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
  }
  .item-form input{
    border:1px solid var(--line);
    border-radius:6px;
    padding:8px 10px;
    font-size:14px;
    min-width:0;
  }
  .item-form input[name="iname"], .item-form input#newDivName{ flex:1; }
  .item-form input[name="iprice"]{ width:90px; font-family:var(--mono); }
  .item-form button{
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:8px 14px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }

  .cat-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
    margin-top:10px;
  }
  .cat-header{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .cat-toggle{
    flex:0 0 auto;
    width:20px;
    text-align:center;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:13px;
    user-select:none;
  }
  .cat-header input.cat-name{
    flex:1;
    min-width:0;
    font-weight:800;
    font-size:15px;
    border:1px solid transparent;
    padding:6px 8px;
    border-radius:6px;
    background:transparent;
  }
  .cat-header input.cat-name:focus{ border-color:var(--line); background:var(--paper); }
  .cat-header .save-btn{ font-size:12px; color:var(--accent-dark); cursor:pointer; font-weight:700; padding:4px 6px; white-space:nowrap; }
  .cat-header .del-btn{ font-size:12px; color:var(--brick); cursor:pointer; font-weight:700; padding:4px 6px; white-space:nowrap; }

  .cat-item-form{
    display:flex;
    gap:6px;
    margin-top:10px;
  }
  .cat-item-form input[name="iname"]{ flex:1; min-width:0; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:13px; }
  .cat-item-form input[name="iprice"]{ width:80px; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:13px; font-family:var(--mono); }
  .cat-item-form button{ background:var(--accent); color:#fff; border:none; border-radius:6px; padding:7px 12px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }

  .item-container{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    margin-top:8px;
  }
  .item-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .item-row input[name="ename"]{ flex:1; min-width:0; border:1px solid transparent; padding:6px 8px; border-radius:6px; font-size:13px; background:transparent; }
  .item-row input[name="eprice"]{ width:75px; border:1px solid transparent; padding:6px 8px; border-radius:6px; font-family:var(--mono); background:transparent; text-align:right; font-size:13px; }
  .item-row input:focus{ border-color:var(--line); background:#fff; }
  .item-row .save-btn{ font-size:11px; color:var(--accent-dark); cursor:pointer; font-weight:700; padding:4px 6px; white-space:nowrap; }
  .item-row .del-btn{ font-size:11px; color:var(--brick); cursor:pointer; font-weight:700; padding:4px 6px; white-space:nowrap; }

  .div-card{
    background:var(--paper);
    border:2px solid var(--ink);
    border-radius:12px;
    padding:14px;
    margin-top:14px;
  }
  .div-header{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .div-toggle{
    flex:0 0 auto;
    width:20px;
    text-align:center;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:14px;
    user-select:none;
  }
  .div-header input.div-name{
    flex:1;
    min-width:0;
    font-weight:800;
    font-size:16px;
    border:1px solid transparent;
    padding:6px 8px;
    border-radius:6px;
    background:transparent;
    color:var(--gold);
  }
  .div-header input.div-name:focus{ border-color:var(--line); background:var(--card); }
  .div-header .save-btn{ font-size:12px; color:var(--accent-dark); cursor:pointer; font-weight:700; padding:4px 6px; white-space:nowrap; }
  .div-header .del-btn{ font-size:12px; color:var(--brick); cursor:pointer; font-weight:700; padding:4px 6px; white-space:nowrap; }
  .div-body{ margin-top:4px; }

  .color-toggle-label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    margin-top:6px;
    cursor:pointer;
  }
  .color-toggle-label input[type="checkbox"]{
    width:15px; height:15px;
    accent-color:var(--accent);
    cursor:pointer;
  }
  .color-block{ margin-top:6px; }
  .color-tags{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:6px;
  }
  .color-tag{
    display:inline-flex;
    align-items:center;
    gap:5px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:4px 10px;
    font-size:12px;
    font-weight:600;
  }
  .color-tag-del{ color:var(--brick); cursor:pointer; font-size:12px; }
  .color-add-row{
    display:flex;
    gap:6px;
  }
  .color-add-row input{ flex:1; min-width:0; border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:12px; background:#fff; }
  .color-add-row button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:6px 12px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }

  .subitem-block{ margin-top:10px; padding-top:8px; border-top:1px dashed var(--line); }
  .subitem-label{ font-size:11px; font-weight:800; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
  .subitem-row{
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:6px;
  }
  .subitem-row input.sub-name{ flex:1; min-width:0; border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:12px; background:#fff; }
  .subitem-row input.sub-price{ width:70px; border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:12px; font-family:var(--mono); background:#fff; }
  .sub-save-btn{ font-size:11px; color:var(--accent-dark); cursor:pointer; font-weight:700; padding:4px 6px; white-space:nowrap; }
  .sub-del-btn{ font-size:11px; color:var(--brick); cursor:pointer; font-weight:700; padding:4px 6px; white-space:nowrap; }
  .subitem-add-row{
    display:flex;
    gap:6px;
    margin-top:8px;
  }
  .subitem-add-row input.new-sub-name{ flex:1; min-width:0; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:12px; }
  .subitem-add-row input.new-sub-price{ width:75px; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:12px; font-family:var(--mono); }
  .add-subitem-btn{
    background:transparent;
    border:1px dashed var(--line);
    color:var(--accent-dark);
    border-radius:6px;
    padding:5px 10px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }

  /* 收銀畫面：品項卡片(含顏色/細項按鈕) */
  .item-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .item-card .item-btn{
    width:100%;
    background:transparent;
    border:none;
    border-radius:0;
    padding:12px 10px;
    text-align:left;
    cursor:pointer;
  }
  .item-card .item-btn:disabled{ cursor:default; }
  .item-card .item-btn .name{ font-weight:700; font-size:14px; display:block; margin-bottom:4px; }
  .item-card .item-btn .price{ font-family:var(--mono); font-size:13px; color:var(--accent-dark); }
  .item-color-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:0 10px 10px;
  }
  .color-btn{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:5px 12px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .color-btn:active{ transform:scale(0.95); }
  .item-sub-row{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding:0 10px 10px;
    border-top:1px dashed var(--line);
    padding-top:8px;
  }
  .sub-btn{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    text-align:left;
  }
  .sub-btn .name{ font-weight:600; font-size:13px; }
  .sub-btn .price{ font-family:var(--mono); font-size:12px; color:var(--accent-dark); }

(function(){
  const LOGIN_USER = '@user01';
  const LOGIN_PASS = '@user01';
  const overlay = document.getElementById('loginOverlay');
  const appRoot = document.getElementById('appRoot');
  const userInput = document.getElementById('loginUser');
  const passInput = document.getElementById('loginPass');
  const errorEl = document.getElementById('loginError');

  function showApp(){
    overlay.style.display = 'none';
    appRoot.style.display = '';
  }

  try{
    if(localStorage.getItem('pos_logged_in') === 'true'){
      showApp();
      return;
    }
  }catch(e){ /* 若無法讀取localStorage，就照常顯示登入畫面 */ }

  function doLogin(){
    const u = userInput.value.trim();
    const p = passInput.value;
    if(u === LOGIN_USER && p === LOGIN_PASS){
      try{ localStorage.setItem('pos_logged_in', 'true'); }catch(e){ /* 忽略 */ }
      errorEl.style.display = 'none';
      showApp();
    } else {
      errorEl.style.display = 'block';
    }
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  [userInput, passInput].forEach(el=>{
    el.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') doLogin(); });
  });
})();
</script>

  let fbDb = null;
  let fbReady = false;

  function setSyncStatus(text, cls){
    const el = $('#syncStatus');
    if(!el) return;
    el.textContent = text;
    el.className = 'sync-status' + (cls ? ' ' + cls : '');
  }

  function catalogRef(){ return fbDb.doc('shops/main/meta/catalog'); }
  function ordersCollRef(){ return fbDb.collection('shops/main/orders'); }
  function orderRef(id){ return fbDb.doc('shops/main/orders/' + id); }

  function timeoutReject(ms, msg){
    return new Promise((_, reject)=> setTimeout(()=> reject(new Error(msg || 'timeout')), ms));
  }

  async function initFirebase(){
    try{
      if(typeof firebase === 'undefined'){ throw new Error('firebase sdk not loaded'); }
      const app = firebase.initializeApp(firebaseConfig);
      fbDb = firebase.firestore(app);
      // 注意：不啟用 enablePersistence()，因為部分行動瀏覽器（尤其 iOS Safari）
      // 在以本機檔案（file://）開啟時，這個功能容易卡住不回應，導致整個連線流程卡死。
      const auth = firebase.auth(app);
      const authPromise = new Promise((resolve, reject)=>{
        const unsub = auth.onAuthStateChanged(user=>{
          if(user){ unsub(); resolve(); }
        }, reject);
        auth.signInAnonymously().catch(reject);
      });
      // 最多等 8 秒，避免在連線環境不佳或瀏覽器限制下永久卡住
      await Promise.race([authPromise, timeoutReject(8000, 'auth timeout')]);
      fbReady = true;
      setSyncStatus('☁ 已連線，多裝置同步中', 'online');
    }catch(e){
      fbReady = false;
      const detail = (e && (e.code || e.message)) ? (e.code || e.message) : 'unknown error';
      setSyncStatus('⚠ 無法連線雲端（' + detail + '）', 'offline');
    }
  }

  function subscribeCatalog(){
    if(!fbReady) return;
    catalogRef().onSnapshot(snap=>{
      if(!snap.exists) return;
      const data = snap.data();
      let changed = false;
      if(Array.isArray(data.divisions) && JSON.stringify(data.divisions) !== JSON.stringify(divisions)){
        divisions = data.divisions; changed = true;
      }
      if(Array.isArray(data.categories) && JSON.stringify(data.categories) !== JSON.stringify(categories)){
        categories = data.categories; changed = true;
      }
      if(Array.isArray(data.items) && JSON.stringify(data.items) !== JSON.stringify(items)){
        items = data.items; changed = true;
      }
      if(Array.isArray(data.subItems) && JSON.stringify(data.subItems) !== JSON.stringify(subItems)){
        subItems = data.subItems; changed = true;
      }
      if(changed){
        storageSet('divisions', JSON.stringify(divisions));
        storageSet('categories', JSON.stringify(categories));
        storageSet('items', JSON.stringify(items));
        storageSet('subItems', JSON.stringify(subItems));
        if(divisions.length && !divisions.find(d=>d.id===activeDivisionId)) activeDivisionId = divisions[0].id;
        if(categories.length && !categories.find(c=>c.id===activeCategoryId)) activeCategoryId = categories[0].id;
        renderDivisionChips(); renderCategoryChips(); renderItemGrid(); renderDivisionSettings(); renderCart();
      }
    }, ()=>{ /* 忽略監聽錯誤，本機資料仍可運作 */ });
  }

  function subscribeOrders(){
    if(!fbReady) return;
    ordersCollRef().onSnapshot(snap=>{
      const list = [];
      snap.forEach(d=> list.push(d.data()));
      list.sort((a,b)=> new Date(b.time) - new Date(a.time));
      orders = list;
      storageSet('orders', JSON.stringify(orders));
      renderCart();
      renderHistory();
      renderDaily();
    }, ()=>{ /* 忽略監聽錯誤 */ });
  }

  async function fsSetOrder(order){
    if(!fbReady) return;
    try{ await orderRef(order.id).set(order); }catch(e){ /* 離線時 Firestore 會自動排隊，恢復連線後補送 */ }
  }
  async function fsDeleteOrder(id){
    if(!fbReady) return;
    try{ await orderRef(id).delete(); }catch(e){ /* 忽略 */ }
  }

  // ================= 品項設定：大類別 + 細項 =================
  function renderDivisionSettings(){
    const list = $('#divisionList');
    if(divisions.length === 0){
      list.innerHTML = '<div class="empty-hint">還沒有任何分類，請先在上方新增一個分類（例如：客廳、臥室）。</div>';
      return;
    }
    const sortedDivisions = divisions.slice().sort((a,b)=> a.name.localeCompare(b.name));
    list.innerHTML = sortedDivisions.map(div=>{
      const divCollapsed = collapsedDivisions.has(div.id);
      const divCats = categories.filter(c=>c.divisionId===div.id)
        .slice()
        .sort((a,b)=> a.name.localeCompare(b.name));

      const catsHtml = divCats.length === 0
        ? '<div class="empty-hint" style="padding:8px 2px;">這個分類還沒有類別。</div>'
        : divCats.map(cat=>{
            const catCollapsed = collapsedCats.has(cat.id);
            const catItems = items.filter(i=>i.categoryId===cat.id)
              .slice()
              .sort((a,b)=> a.name.localeCompare(b.name));

            const itemsHtml = catItems.length === 0
              ? '<div class="empty-hint" style="padding:8px 2px;">這個類別還沒有品項。</div>'
              : catItems.map(it=>{
                  const colors = it.colors || [];
                  const colorTagsHtml = colors.map((c,idx)=>`
                    <span class="color-tag" data-idx="${idx}">${escapeHtml(c)} <span class="color-tag-del">✕</span></span>
                  `).join('');

                  const itemSubItems = subItems.filter(s=>s.itemId===it.id)
                    .slice()
                    .sort((a,b)=> a.name.localeCompare(b.name));
                  const subRowsHtml = itemSubItems.map(s=>`
                    <div class="subitem-row" data-id="${s.id}">
                      <input type="text" class="sub-name" value="${escapeHtml(s.name)}">
                      <input type="number" class="sub-price" value="${s.price}">
                      <span class="sub-save-btn">儲存</span>
                      <span class="sub-del-btn">刪除</span>
                    </div>
                  `).join('');

                  return `
                  <div class="item-container" data-id="${it.id}">
                    <div class="item-row">
                      <input type="text" name="ename" value="${escapeHtml(it.name)}">
                      <input type="number" name="eprice" value="${it.price}">
                      <span class="save-btn">儲存</span>
                      <span class="del-btn">刪除</span>
                    </div>
                    <label class="color-toggle-label">
                      <input type="checkbox" class="ecolor" ${it.colorEnabled ? 'checked' : ''}> 顏色
                    </label>
                    <div class="color-block" style="display:${it.colorEnabled ? 'block' : 'none'};">
                      <div class="color-tags">${colorTagsHtml}</div>
                      <div class="color-add-row">
                        <input type="text" class="new-color-input" placeholder="顏色名稱（例如：黑色）">
                        <button class="add-color-btn" type="button">新增</button>
                      </div>
                    </div>
                    <div class="subitem-block">
                      <div class="subitem-label">細項</div>
                      <div class="subitem-rows">${subRowsHtml}</div>
                      <div class="subitem-add-row">
                        <input type="text" class="new-sub-name" placeholder="細項名稱">
                        <input type="number" class="new-sub-price" placeholder="價格" inputmode="decimal">
                        <button class="add-subitem-btn" type="button">＋ 新增細項</button>
                      </div>
                    </div>
                  </div>
                `;
                }).join('');

            return `
              <div class="cat-card" data-catid="${cat.id}">
                <div class="cat-header">
                  <span class="cat-toggle" data-catid="${cat.id}">${catCollapsed ? '▸' : '▾'}</span>
                  <input type="text" class="cat-name" value="${escapeHtml(cat.name)}">
                  <span class="save-btn">儲存</span>
                  <span class="del-btn">刪除類別</span>
                </div>
                <div class="cat-item-form">
                  <input type="text" name="iname" placeholder="品項名稱">
                  <input type="number" name="iprice" placeholder="價格" inputmode="decimal">
                  <button class="add-item-btn">新增品項</button>
                </div>
                <div class="cat-items" style="display:${catCollapsed ? 'none' : 'block'};">${itemsHtml}</div>
              </div>
            `;
          }).join('');

      return `
        <div class="div-card" data-divid="${div.id}">
          <div class="div-header">
            <span class="div-toggle" data-divid="${div.id}">${divCollapsed ? '▸' : '▾'}</span>
            <input type="text" class="div-name" value="${escapeHtml(div.name)}">
            <span class="save-btn">儲存</span>
            <span class="del-btn">刪除分類</span>
          </div>
          <div class="cat-item-form">
            <input type="text" name="cname" placeholder="類別名稱">
            <button class="add-cat-btn">新增類別</button>
          </div>
          <div class="div-body" style="display:${divCollapsed ? 'none' : 'block'};">${catsHtml}</div>
        </div>
      `;
    }).join('');

    // ---- 分類 摺疊 ----
    $$('.div-toggle', list).forEach(toggle=>{
      toggle.addEventListener('click', ()=>{
        const divId = toggle.dataset.divid;
        if(collapsedDivisions.has(divId)) collapsedDivisions.delete(divId);
        else collapsedDivisions.add(divId);
        renderDivisionSettings();
      });
    });

    // ---- 類別 摺疊 ----
    $$('.cat-toggle', list).forEach(toggle=>{
      toggle.addEventListener('click', ()=>{
        const catId = toggle.dataset.catid;
        if(collapsedCats.has(catId)) collapsedCats.delete(catId);
        else collapsedCats.add(catId);
        renderDivisionSettings();
      });
    });

    $$('.div-card', list).forEach(divCard=>{
      const divId = divCard.dataset.divid;

      // 分類 儲存/刪除
      $('.div-header .save-btn', divCard).addEventListener('click', async ()=>{
        const nameEl = $('.div-header .div-name', divCard);
        const name = nameEl.value.trim();
        if(!name){ toast('請輸入分類名稱'); return; }
        const div = divisions.find(d=>d.id===divId);
        div.name = name;
        await saveDivisions();
        renderDivisionSettings();
        renderDivisionChips();
        toast('已更新分類');
      });
      $('.div-header .del-btn', divCard).addEventListener('click', async ()=>{
        if(!confirm('刪除這個分類會一併刪除底下所有類別、品項與細項，確定要刪除嗎？')) return;
        const removedCatIds = categories.filter(c=>c.divisionId===divId).map(c=>c.id);
        const removedItemIds = items.filter(i=>removedCatIds.includes(i.categoryId)).map(i=>i.id);
        divisions = divisions.filter(d=>d.id!==divId);
        categories = categories.filter(c=>c.divisionId!==divId);
        items = items.filter(i=>!removedCatIds.includes(i.categoryId));
        subItems = subItems.filter(s=>!removedItemIds.includes(s.itemId));
        cart = cart.filter(c=> !removedItemIds.some(id=> c.itemId===id || c.itemId.indexOf(id+'::')===0));
        collapsedDivisions.delete(divId);
        await saveDivisions(); await saveCategories(); await saveItems(); await saveSubItems();
        if(activeDivisionId===divId) activeDivisionId = divisions.length ? divisions[0].id : null;
        renderDivisionSettings();
        renderDivisionChips(); renderCategoryChips(); renderItemGrid(); renderCart();
        toast('已刪除分類');
      });

      // 新增類別
      $('.add-cat-btn', divCard).addEventListener('click', async ()=>{
        const nameEl = $('.cat-item-form input[name="cname"]', divCard);
        const name = nameEl.value.trim();
        if(!name){ toast('請輸入類別名稱'); return; }
        categories.push({ id: uid(), name, divisionId: divId });
        await saveCategories();
        nameEl.value = '';
        renderDivisionSettings();
        renderCategoryChips();
        toast('已新增類別');
      });

      $$('.cat-card', divCard).forEach(catCard=>{
        const catId = catCard.dataset.catid;

        // 類別 儲存/刪除
        $('.cat-header .save-btn', catCard).addEventListener('click', async ()=>{
          const nameEl = $('.cat-header .cat-name', catCard);
          const name = nameEl.value.trim();
          if(!name){ toast('請輸入類別名稱'); return; }
          const cat = categories.find(c=>c.id===catId);
          cat.name = name;
          await saveCategories();
          renderDivisionSettings();
          renderCategoryChips();
          toast('已更新類別');
        });
        $('.cat-header .del-btn', catCard).addEventListener('click', async ()=>{
          if(!confirm('刪除這個類別會一併刪除底下所有品項與細項，確定要刪除嗎？')) return;
          const removedItemIds = items.filter(i=>i.categoryId===catId).map(i=>i.id);
          categories = categories.filter(c=>c.id!==catId);
          items = items.filter(i=>i.categoryId!==catId);
          subItems = subItems.filter(s=>!removedItemIds.includes(s.itemId));
          cart = cart.filter(c=> !removedItemIds.some(id=> c.itemId===id || c.itemId.indexOf(id+'::')===0));
          collapsedCats.delete(catId);
          await saveCategories(); await saveItems(); await saveSubItems();
          if(activeCategoryId===catId) activeCategoryId = null;
          renderDivisionSettings();
          renderCategoryChips(); renderItemGrid(); renderCart();
          toast('已刪除類別');
        });

        // 新增品項
        $('.add-item-btn', catCard).addEventListener('click', async ()=>{
          const nameEl = $('.cat-item-form input[name="iname"]', catCard);
          const priceEl = $('.cat-item-form input[name="iprice"]', catCard);
          const name = nameEl.value.trim();
          const price = parseFloat(priceEl.value);
          if(!name || isNaN(price) || price < 0){ toast('請輸入正確的品項名稱與價格'); return; }
          items.push({ id: uid(), name, price, categoryId: catId, colorEnabled:false, colors:[] });
          await saveItems();
          nameEl.value=''; priceEl.value='';
          renderDivisionSettings();
          renderItemGrid();
          toast('已新增品項');
        });

        // 品項（含顏色、細項）
        $$('.item-container', catCard).forEach(container=>{
          const id = container.dataset.id;
          const row = $('.item-row', container);
          const colorBlock = $('.color-block', container);
          const colorTagsWrap = $('.color-tags', container);
          const subRowsWrap = $('.subitem-rows', container);

          $('.ecolor', container).addEventListener('change', (e)=>{
            colorBlock.style.display = e.target.checked ? 'block' : 'none';
          });

          $('.add-color-btn', container).addEventListener('click', ()=>{
            const input = $('.new-color-input', container);
            const name = input.value.trim();
            if(!name) return;
            const idx = $$('.color-tag', colorTagsWrap).length;
            const span = document.createElement('span');
            span.className = 'color-tag';
            span.dataset.idx = idx;
            span.innerHTML = escapeHtml(name) + ' <span class="color-tag-del">✕</span>';
            colorTagsWrap.appendChild(span);
            input.value = '';
          });
          colorTagsWrap.addEventListener('click', (e)=>{
            if(e.target.classList.contains('color-tag-del')){
              e.target.closest('.color-tag').remove();
            }
          });

          $('.save-btn', row).addEventListener('click', async ()=>{
            const name = $('input[name="ename"]', row).value.trim();
            const price = parseFloat($('input[name="eprice"]', row).value);
            if(!name || isNaN(price)){ toast('請輸入正確的名稱與價格'); return; }
            const colorEnabled = $('.ecolor', container).checked;
            const colors = $$('.color-tag', colorTagsWrap).map(tag=> tag.textContent.replace('✕','').trim()).filter(Boolean);
            const it = items.find(i=>i.id===id);
            it.name = name; it.price = price;
            it.colorEnabled = colorEnabled;
            it.colors = colorEnabled ? colors : [];
            await saveItems();
            cart.forEach(c=>{ if(c.itemId===id){ c.name=name; c.price=price; } });
            renderDivisionSettings();
            renderItemGrid();
            renderCart();
            toast('已更新品項');
          });
          $('.del-btn', row).addEventListener('click', async ()=>{
            items = items.filter(i=>i.id!==id);
            subItems = subItems.filter(s=>s.itemId!==id);
            cart = cart.filter(c=> c.itemId!==id && c.itemId.indexOf(id+'::')!==0);
            await saveItems(); await saveSubItems();
            renderDivisionSettings();
            renderItemGrid();
            renderCart();
            toast('已刪除品項');
          });

          // 新增細項
          $('.add-subitem-btn', container).addEventListener('click', async ()=>{
            const nameEl = $('.new-sub-name', container);
            const priceEl = $('.new-sub-price', container);
            const name = nameEl.value.trim();
            const price = parseFloat(priceEl.value);
            if(!name || isNaN(price) || price < 0){ toast('請輸入正確的細項名稱與價格'); return; }
            subItems.push({ id: uid(), name, price, itemId: id });
            await saveSubItems();
            nameEl.value=''; priceEl.value='';
            renderDivisionSettings();
            renderItemGrid();
            toast('已新增細項');
          });

          // 細項 儲存/刪除
          $$('.subitem-row', subRowsWrap).forEach(subRow=>{
            const subId = subRow.dataset.id;
            $('.sub-save-btn', subRow).addEventListener('click', async ()=>{
              const name = $('.sub-name', subRow).value.trim();
              const price = parseFloat($('.sub-price', subRow).value);
              if(!name || isNaN(price)){ toast('請輸入正確的細項名稱與價格'); return; }
              const s = subItems.find(x=>x.id===subId);
              s.name = name; s.price = price;
              await saveSubItems();
              cart.forEach(c=>{ if(c.itemId===subId){ c.name=name; c.price=price; } });
              renderDivisionSettings();
              renderItemGrid();
              renderCart();
              toast('已更新細項');
            });
            $('.sub-del-btn', subRow).addEventListener('click', async ()=>{
              subItems = subItems.filter(s=>s.id!==subId);
              cart = cart.filter(c=>c.itemId!==subId);
              await saveSubItems();
              renderDivisionSettings();
              renderItemGrid();
              renderCart();
              toast('已刪除細項');
            });
          });
        });
      });
    });
  }

  $('#addDivBtn').addEventListener('click', async ()=>{

    if(!name){ toast('請輸入分類名稱'); return; }

  // ================= 收銀：分類 chips =================
  function renderDivisionChips(){
    const row = $('#divChipRow');
    if(divisions.length === 0){
      row.innerHTML = '<div class="empty-hint">尚無分類，請至「品項設定」新增分類。</div>';
      return;
    }
    if(!activeDivisionId || !divisions.find(d=>d.id===activeDivisionId)){
      activeDivisionId = divisions[0].id;
    }
    const sortedDivisions = divisions.slice().sort((a,b)=> a.name.localeCompare(b.name));
    row.innerHTML = sortedDivisions.map(div=>`
      <button class="cat-chip ${div.id===activeDivisionId ? 'active' : ''}" data-id="${div.id}">${escapeHtml(div.name)}</button>
    `).join('');
    $$('.cat-chip', row).forEach(chip=>{
      chip.addEventListener('click', ()=>{
        activeDivisionId = chip.dataset.id;
        activeCategoryId = null;
        renderDivisionChips();
        renderCategoryChips();
        renderItemGrid();
      });
    });
  }

  // ================= 收銀：大類別 chips =================
  function renderCategoryChips(){
    const row = $('#catChipRow');
    const divCats = categories.filter(c=>c.divisionId===activeDivisionId);
    if(divCats.length === 0){
      row.innerHTML = '<div class="empty-hint">這個分類還沒有類別，請至「品項設定」新增。</div>';
      return;
    }
    if(!activeCategoryId || !divCats.find(c=>c.id===activeCategoryId)){
      activeCategoryId = divCats[0].id;
    }
    const sortedCategories = divCats.slice().sort((a,b)=> a.name.localeCompare(b.name));
    row.innerHTML = sortedCategories.map(cat=>`
      <button class="cat-chip ${cat.id===activeCategoryId ? 'active' : ''}" data-id="${cat.id}">${escapeHtml(cat.name)}</button>
    `).join('');
    $$('.cat-chip', row).forEach(chip=>{
      chip.addEventListener('click', ()=>{
        activeCategoryId = chip.dataset.id;
        renderCategoryChips();
        renderItemGrid();
      });
    });
  }

  // ================= 收銀：細項 grid =================
  function renderItemGrid(){
    const grid = $('#itemGrid');
    if(divisions.length === 0){
      grid.innerHTML = '<div class="empty-hint">請先到「品項設定」新增分類、類別與品項。</div>';
      return;
    }
    if(!activeCategoryId){
      grid.innerHTML = '<div class="empty-hint">請先選擇類別。</div>';
      return;
    }
    const list = items.filter(i=>i.categoryId===activeCategoryId)
      .slice()
      .sort((a,b)=> a.name.localeCompare(b.name));
    if(list.length === 0){
      grid.innerHTML = '<div class="empty-hint">這個類別還沒有品項，請至「品項設定」新增。</div>';
      return;
    }
    grid.innerHTML = list.map(it=>{
      const colors = (it.colorEnabled && it.colors && it.colors.length) ? it.colors : [];
      const itemSubItems = subItems.filter(s=>s.itemId===it.id)
        .slice()
        .sort((a,b)=> a.name.localeCompare(b.name));

      const colorHtml = colors.length
        ? `<div class="item-color-row">${colors.map(c=>`<button class="color-btn" data-id="${it.id}" data-color="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('')}</div>`
        : '';
      const subHtml = itemSubItems.length
        ? `<div class="item-sub-row">${itemSubItems.map(s=>`
            <button class="sub-btn" data-id="${s.id}">
              <span class="name">${escapeHtml(s.name)}</span>
              <span class="price">${fmt(s.price)}</span>
            </button>
          `).join('')}</div>`
        : '';

      return `
        <div class="item-card">
          <button class="item-btn" data-id="${it.id}" ${colors.length ? 'disabled' : ''}>
            <span class="name">${escapeHtml(it.name)}</span>
            <span class="price">${fmt(it.price)}</span>
          </button>
          ${colorHtml}
          ${subHtml}
        </div>
      `;
    }).join('');

    $$('.item-btn', grid).forEach(b=>{
      if(b.disabled) return;
      b.addEventListener('click', ()=> addItemToCart(b.dataset.id));
    });
    $$('.color-btn', grid).forEach(b=>{
      b.addEventListener('click', ()=> addItemToCart(b.dataset.id, b.dataset.color));
    });
    $$('.sub-btn', grid).forEach(b=>{
      b.addEventListener('click', ()=> addSubItemToCart(b.dataset.id));
    });
  }

  // ================= 收銀：購物車 =================
  function addLineToCart(lineId, name, price){
    const line = cart.find(c=>c.itemId===lineId);
    if(line){ line.qty += 1; }
    else{ cart.push({ itemId: lineId, name, price, qty:1 }); }
    renderCart();
  }

  function addItemToCart(itemId, color){
    const it = items.find(i=>i.id===itemId);
    if(!it) return;
    if(color){
      addLineToCart(itemId + '::color::' + color, it.name + '（' + color + '）', it.price);
    } else {
      addLineToCart(itemId, it.name, it.price);
    }
  }

  function addSubItemToCart(subId){
    const s = subItems.find(x=>x.id===subId);
    if(!s) return;
    addLineToCart(subId, s.name, s.price);
  }

  function computeSubtotal(){
    return cart.reduce((s,c)=> s + c.price*c.qty, 0);
  }
  function computeDiscount(subtotal){
    if(!$('#optDiscount').checked) return 0;
    const v = parseFloat($('#discountInput').value);
    if(isNaN(v) || v < 0) return 0;
    return Math.min(v, subtotal);
  }

  function renderCart(){
    const list = $('#cartList');
    if(cart.length === 0){
      list.innerHTML = '<div class="cart-empty">尚未加入任何品項</div>';
    } else {
      list.innerHTML = cart.map(c => `
        <div class="cart-line" data-id="${c.itemId}">
          <span class="cl-name">${escapeHtml(c.name)}</span>
          <span class="qty-ctrl">
            <button class="qminus">−</button>
            <span>${c.qty}</span>
            <button class="qplus">＋</button>
          </span>
          <span class="cl-sub">${fmt(c.price * c.qty)}</span>
          <span class="cl-remove">✕</span>
        </div>
      `).join('');
      $$('.cart-line', list).forEach(row=>{
        const id = row.dataset.id;
        $('.qplus', row).addEventListener('click', ()=>{
          const c = cart.find(x=>x.itemId===id); c.qty+=1; renderCart();
        });
        $('.qminus', row).addEventListener('click', ()=>{
          const c = cart.find(x=>x.itemId===id);
          c.qty-=1;
          if(c.qty<=0) cart = cart.filter(x=>x.itemId!==id);
          renderCart();
        });
        $('.cl-remove', row).addEventListener('click', ()=>{
          cart = cart.filter(x=>x.itemId!==id);
          renderCart();
        });
      });
    }
    $('#checkoutBtn').disabled = cart.length === 0;
    renderTotals();
  }

  function computeDeposit(total){
    if(!$('#optDeposit').checked) return 0;
    let sum = 0;
    if($('#optDepositCash').checked){
      const v = parseFloat($('#depositCashAmount').value);
      if(!isNaN(v) && v >= 0) sum += v;
    }
    if($('#optDepositTransfer').checked){
      const v = parseFloat($('#depositTransferAmount').value);
      if(!isNaN(v) && v >= 0) sum += v;
    }
    return Math.min(sum, total);
  }

  function computeCleanupAmount(){
    if(!$('#optCleanup').checked) return 0;
    const v = parseFloat($('#cleanupAmount').value);
    return (isNaN(v) || v < 0) ? 0 : v;
  }

  function computeMovingAmount(){
    if(!$('#optMoving').checked) return 0;
    const v = parseFloat($('#movingAmount').value);
    return (isNaN(v) || v < 0) ? 0 : v;
  }

  function computeTax(){
    if(!$('#optInvoice').checked) return 0;
    const v = parseFloat($('#taxInput').value);
    return (isNaN(v) || v < 0) ? 0 : v;
  }

  function computeReceived(){
    let sum = 0;
    if($('#optCash').checked){
      const v = parseFloat($('#cashAmountInput').value);
      if(!isNaN(v) && v >= 0) sum += v;
    }
    if($('#optTransfer').checked){
      const v = parseFloat($('#transferAmountInput').value);
      if(!isNaN(v) && v >= 0) sum += v;
    }
    return sum;
  }

  function renderTotals(){
    const subtotal = computeSubtotal();
    const discount = computeDiscount(subtotal);
    const itemsTotal = Math.max(subtotal - discount, 0);
    const cleanupAmt = computeCleanupAmount();
    const movingAmt = computeMovingAmount();
    const taxAmt = computeTax();
    const total = itemsTotal + cleanupAmt + movingAmt + taxAmt;
    const deposit = computeDeposit(total);
    const balance = Math.max(total - deposit, 0);

    $('#subtotalRow').style.display = discount > 0 ? 'flex' : 'none';
    $('#discountRow').style.display = discount > 0 ? 'flex' : 'none';
    $('#subtotalDisplay').textContent = fmt(subtotal);
    $('#discountDisplay').textContent = '-' + fmt(discount);
    $('#cleanupTotalRow').style.display = cleanupAmt > 0 ? 'flex' : 'none';
    $('#cleanupTotalDisplay').textContent = fmt(cleanupAmt);
    $('#movingTotalRow').style.display = movingAmt > 0 ? 'flex' : 'none';
    $('#movingTotalDisplay').textContent = fmt(movingAmt);
    $('#taxTotalRow').style.display = taxAmt > 0 ? 'flex' : 'none';
    $('#taxTotalDisplay').textContent = fmt(taxAmt);
    $('#totalDisplay').textContent = fmt(total);
    $('#balanceRow').style.display = deposit > 0 ? 'flex' : 'none';
    $('#balanceDisplay').textContent = fmt(balance);

    // 只有單選一種付款方式且尚未手動修改時，才自動帶入應收金額
    const cashOn = $('#optCash').checked, transferOn = $('#optTransfer').checked;
    if(cashOn && !transferOn && !cashEdited){
      $('#cashAmountInput').value = balance > 0 ? balance : '';
    }
    if(transferOn && !cashOn && !transferEdited){
      $('#transferAmountInput').value = balance > 0 ? balance : '';
    }
    $('#cashHint').textContent = $('#optDeposit').checked
      ? '已勾選訂金，付款方式暫時鎖定；尾款/找零會直接以應收餘額計算'
      : '勾選付款方式後會自動帶入應收金額；如需分開填寫或有尾款/找零情況可自行調整';
    renderPayment(balance);
  }

  function renderPayment(balance){
    const disp = $('#payDisplay');
    const depositOn = $('#optDeposit').checked;
    const cashOn = $('#optCash').checked, transferOn = $('#optTransfer').checked;
    if(!depositOn && !cashOn && !transferOn){
      disp.textContent = '請勾選現場結清或訂金';
      disp.className = 'pill zero';
      return;
    }
    const received = computeReceived();
    const diff = received - balance;
    if(diff < -0.001){
      disp.textContent = '尾款 ' + fmt(-diff);
      disp.className = 'pill unpaid';
    } else if(diff > 0.001){
      disp.textContent = '找零 ' + fmt(diff);
      disp.className = 'pill change';
    } else {
      disp.textContent = '剛好付清';
      disp.className = 'pill change';
    }
  }

    const deposit = computeDeposit(total);

        else { el.disabled = true; el.value = ''; }
      });
      if(affectsTotal) renderTotals();
    });
  }

  $('#checkoutBtn').addEventListener('click', async ()=>{
    if(cart.length === 0) return;
    const subtotal = computeSubtotal();
    const discount = computeDiscount(subtotal);
    const itemsTotal = Math.max(subtotal - discount, 0);
    const cleanupAmt = computeCleanupAmount();
    const movingAmt = computeMovingAmount();
    const taxAmt = computeTax();
    const total = itemsTotal + cleanupAmt + movingAmt + taxAmt;
    const deposit = computeDeposit(total);
    const balance = Math.max(total - deposit, 0);
    const cash = $('#optCash').checked ? (parseFloat($('#cashAmountInput').value) || 0) : 0;
    const transfer = $('#optTransfer').checked ? (parseFloat($('#transferAmountInput').value) || 0) : 0;
    const received = cash + transfer;
    const unpaid = Math.max(balance - received, 0);
    const change = Math.max(received - balance, 0);

    const needsTab = $('#optTab').checked;
    const delivery = needsTab && $('#optDelivery').checked;
    const pickup = needsTab && $('#optPickup').checked;
    const cleanup = {
      enabled: $('#optCleanup').checked,
      amount: cleanupAmt,
      items: $('#optCleanup').checked ? $('#cleanupItems').value.trim() : ''
    };
    const recipient = $('#optRecipient').checked ? $('#recipientInput').value.trim() : '';
    const address = $('#optAddress').checked ? $('#addressInput').value.trim() : '';
    const phone = $('#optPhone').checked ? $('#phoneInput').value.trim() : '';
    const geo = $('#optGeo').checked ? $('#geoInput').value.trim() : '';
    const moving = {
      enabled: $('#optMoving').checked,
      amount: movingAmt,
      address: $('#optMoving').checked ? $('#movingAddress').value.trim() : ''
    };
    const invoiceOn = $('#optInvoice').checked;
    const buyer = invoiceOn ? $('#buyerInput').value.trim() : '';
    const taxId = invoiceOn ? $('#taxIdInput').value.trim() : '';
    const depositCash = deposit > 0 && $('#optDepositCash').checked;
    const depositTransfer = deposit > 0 && $('#optDepositTransfer').checked;
    const depositCashAmt = $('#optDepositCash').checked ? (parseFloat($('#depositCashAmount').value) || 0) : 0;
    const depositTransferAmt = $('#optDepositTransfer').checked ? (parseFloat($('#depositTransferAmount').value) || 0) : 0;

    const order = {
      id: uid(),
      time: new Date().toISOString(),
      lines: cart.map(c=>({ name:c.name, price:c.price, qty:c.qty })),
      note: $('#noteInput').value.trim(),
      needsTab, invoice: invoiceOn, buyer, taxId, tax: taxAmt,
      delivery, pickup, cleanup, recipient, address, phone, geo, moving,
      subtotal, discount, cleanupAmt, movingAmt, taxAmt, deposit, depositCash, depositTransfer,
      depositCashAmt, depositTransferAmt, total, balance,
      cash, transfer, received, unpaid, change,
      collected: unpaid === 0
    };
    orders.unshift(order);
    await saveOrders();
    await fsSetOrder(order);
    cart = [];
    resetOrderExtras();
    renderCart();
    toast('已完成結帳 ' + fmt(total));
  });

  // ================= 訂單紀錄 =================
  function isToday(iso){
    const d = new Date(iso), n = new Date();
    return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
  }

  function monthKey(iso){
    const d = new Date(iso);
    return d.getFullYear() + '-' + (d.getMonth()+1);
  }
  function monthLabel(iso){
    const d = new Date(iso);
    return d.getFullYear() + '年' + (d.getMonth()+1) + '月';
  }
  function dayKey(iso){
    const d = new Date(iso);
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }
  function dayLabel(iso){
    const d = new Date(iso);
    const weekday = d.toLocaleDateString('zh-Hant-TW', {weekday:'short'});
    return (d.getMonth()+1) + '月' + d.getDate() + '日（' + weekday + '）';
  }

  function renderHistory(){
    const todays = orders.filter(o=>isToday(o.time));
    $('#statCount').textContent = todays.length;
    $('#statSales').textContent = fmt(todays.reduce((s,o)=>s+o.total,0));
    $('#statUnpaid').textContent = fmt(todays.reduce((s,o)=>s+o.unpaid,0));

    const list = $('#historyList');
    if(orders.length === 0){
      list.innerHTML = '<div class="history-empty">目前還沒有任何訂單紀錄。</div>';
      return;
    }

    const searchTerm = $('#historySearch').value.trim().toLowerCase();
    let visibleOrders = orders;
    if(searchTerm){
      visibleOrders = orders.filter(o=>{
        const nameMatch = (o.recipient && o.recipient.toLowerCase().includes(searchTerm))
          || (o.buyer && o.buyer.toLowerCase().includes(searchTerm));
        const addressMatch = (o.address && o.address.toLowerCase().includes(searchTerm))
          || (o.moving && o.moving.address && o.moving.address.toLowerCase().includes(searchTerm));
        const itemMatch = o.lines.some(l => l.name.toLowerCase().includes(searchTerm));
        return nameMatch || addressMatch || itemMatch;
      });
    }
    if(visibleOrders.length === 0){
      list.innerHTML = `<div class="history-empty">找不到符合「${escapeHtml($('#historySearch').value.trim())}」的訂單（客人姓名、地址或商品名稱）。</div>`;
      return;
    }

    // 依月份分組，每個月裡再依日期分組（orders 本身已是最新在前）
    const groups = [];
    const groupMap = {};
    visibleOrders.forEach(o=>{
      const mKey = monthKey(o.time);
      if(!groupMap[mKey]){
        groupMap[mKey] = { key: mKey, label: monthLabel(o.time), days: [], dayMap: {} };
        groups.push(groupMap[mKey]);
      }
      const mGroup = groupMap[mKey];
      const dKey = dayKey(o.time);
      if(!mGroup.dayMap[dKey]){
        mGroup.dayMap[dKey] = { key: dKey, label: dayLabel(o.time), orders: [] };
        mGroup.days.push(mGroup.dayMap[dKey]);
      }
      mGroup.dayMap[dKey].orders.push(o);
    });

    function renderOrderCard(o){
      const t = new Date(o.time);
      const timeStr = t.toLocaleDateString('zh-Hant-TW') + ' ' + t.toLocaleTimeString('zh-Hant-TW', {hour:'2-digit', minute:'2-digit'});
      const itemsStr = o.lines.map(l => `${escapeHtml(l.name)} x${l.qty}`).join('、');
      const payRow = o.unpaid > 0
        ? `<span class="pill unpaid">未收 ${fmt(o.unpaid)}</span>`
        : (o.change > 0 ? `<span class="pill change">找零 ${fmt(o.change)}</span>` : `<span class="pill zero">付清</span>`);
      const collectedNoteHtml = o.collectedNote
        ? `<span class="pill zero">（${escapeHtml(o.collectedNote)}）</span>`
        : '';
      const badges = [];
      if(o.needsTab) badges.push('開單');
      if(o.delivery) badges.push('送貨');
      if(o.pickup) badges.push('自取');
      if(o.cleanup && o.cleanup.enabled) badges.push('清運');
      if(o.moving && o.moving.enabled) badges.push('搬運費');
      if(o.invoice) badges.push('發票');
      if(o.discount > 0) badges.push('折扣 -' + fmt(o.discount).replace('$',''));
      if(o.deposit > 0){
        let depositLabel = '訂金 ' + fmt(o.deposit);
        const depositMethods = [];
        if(o.depositCash) depositMethods.push('現金 ' + fmt(o.depositCashAmt !== undefined ? o.depositCashAmt : o.deposit));
        if(o.depositTransfer) depositMethods.push('匯款 ' + fmt(o.depositTransferAmt !== undefined ? o.depositTransferAmt : o.deposit));
        if(depositMethods.length) depositLabel += '（' + depositMethods.join('、') + '）';
        badges.push(depositLabel);
      }
      const badgesHtml = badges.length
        ? `<div class="oc-badges">${badges.map(b=>`<span class="oc-badge">${escapeHtml(b)}</span>`).join('')}</div>`
        : '';
      const deliveryDetails = [];
      if(o.cleanup && o.cleanup.enabled){
        deliveryDetails.push(`清運金額 ${fmt(o.cleanup.amount)}${o.cleanup.items ? '，回收品項：' + escapeHtml(o.cleanup.items) : ''}`);
      }
      if(o.moving && o.moving.enabled){
        deliveryDetails.push(`搬運費 ${fmt(o.moving.amount)}${o.moving.address ? '，搬運地址：' + escapeHtml(o.moving.address) : ''}`);
      }
      if(o.recipient) deliveryDetails.push('收件人：' + escapeHtml(o.recipient));
      if(o.address) deliveryDetails.push('地址：' + escapeHtml(o.address));
      if(o.phone) deliveryDetails.push('電話：' + escapeHtml(o.phone));
      if(o.geo){
        const geoTrimmed = o.geo.trim();
        const geoUrl = /^https?:\/\//i.test(geoTrimmed)
          ? geoTrimmed
          : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(geoTrimmed);
        deliveryDetails.push('定位：<a href="' + escapeHtml(geoUrl) + '" target="_blank" rel="noopener" class="geo-link">' + escapeHtml(o.geo) + '</a>');
      }
      if(o.invoice){
        if(o.buyer) deliveryDetails.push('買受人：' + escapeHtml(o.buyer));
        if(o.taxId) deliveryDetails.push('統一編號：' + escapeHtml(o.taxId));
        if(o.taxAmt || o.tax) deliveryDetails.push('稅金：' + fmt(o.taxAmt !== undefined ? o.taxAmt : o.tax));
      }
      const deliveryDetailsHtml = deliveryDetails.length
        ? `<div class="oc-note">${deliveryDetails.join('<br>')}</div>`
        : '';
      const payParts = [];
      if(o.cash) payParts.push('現金 ' + fmt(o.cash));
      if(o.transfer) payParts.push('匯款 ' + fmt(o.transfer));
      const paidStr = payParts.length ? payParts.join('、') : fmt(o.received !== undefined ? o.received : o.cash || 0);
      return `
        <div class="order-card" data-id="${o.id}">
          <div class="oc-top"><span>${timeStr}</span><span>已付 ${paidStr}</span></div>
          <div class="oc-total">${fmt(o.total)}</div>
          <div class="oc-items">${itemsStr}</div>
          ${o.note ? `<div class="oc-note">備註：${escapeHtml(o.note)}</div>` : ''}
          ${badgesHtml}
          ${deliveryDetailsHtml}
          <div class="oc-pay">${payRow}${collectedNoteHtml}</div>
          <div class="oc-buttons">
            ${o.unpaid > 0 ? `<button class="collect-btn">標記已收款</button>` : ''}
            <button class="delete-order-btn">刪除訂單</button>
          </div>
        </div>
      `;
    }

    list.innerHTML = groups.map(g=>{
      const count = g.days.reduce((s,d)=>s+d.orders.length, 0);
      const sum = g.days.reduce((s,d)=>s+d.orders.reduce((s2,o)=>s2+o.total,0), 0);
      const monthCollapsed = collapsedMonths.has(g.key);
      const daysHtml = g.days.map(d=>{
        const dCount = d.orders.length;
        const dSum = d.orders.reduce((s,o)=>s+o.total,0);
        const dayCollapsed = collapsedDays.has(d.key);
        return `
          <div class="day-header" data-daykey="${d.key}">
            <span class="day-toggle">${dayCollapsed ? '▸' : '▾'}</span>
            <span class="day-label">${d.label}</span>
            <span class="day-meta">${dCount} 筆 · ${fmt(dSum)}</span>
          </div>
          <div class="day-body" style="display:${dayCollapsed ? 'none' : 'block'};">
            ${d.orders.map(renderOrderCard).join('')}
          </div>
        `;
      }).join('');
      return `
        <div class="month-group">
          <div class="month-header" data-monthkey="${g.key}">
            <span class="month-toggle">${monthCollapsed ? '▸' : '▾'}</span>
            <span class="month-label">${g.label}</span>
            <span class="month-meta">${count} 筆 · ${fmt(sum)}</span>
          </div>
          <div class="month-body" style="display:${monthCollapsed ? 'none' : 'block'};">
            ${daysHtml}
          </div>
        </div>
      `;
    }).join('');

    $$('.month-header', list).forEach(header=>{
      header.addEventListener('click', ()=>{
        const key = header.dataset.monthkey;
        if(collapsedMonths.has(key)) collapsedMonths.delete(key);
        else collapsedMonths.add(key);
        renderHistory();
      });
    });
    $$('.day-header', list).forEach(header=>{
      header.addEventListener('click', ()=>{
        const key = header.dataset.daykey;
        if(collapsedDays.has(key)) collapsedDays.delete(key);
        else collapsedDays.add(key);
        renderHistory();
      });
    });

    $$('.collect-btn', list).forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const card = btn.closest('.order-card');
        const id = card.dataset.id;
        const o = orders.find(x=>x.id===id);
        const remaining = o.unpaid;
        o.cash = (o.cash || 0) + remaining;
        o.received = (o.received || 0) + remaining;
        o.unpaid = 0; o.change = 0; o.collected = true;
        const now = new Date();
        o.collectedNote = `${now.getMonth()+1}/${now.getDate()}已收款`;
        await saveOrders();
        await fsSetOrder(o);
        renderHistory();
        toast('已標記收款完成');
      });
    });
    $$('.delete-order-btn', list).forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('確定要刪除這筆訂單嗎？此動作無法復原。')) return;
        const card = btn.closest('.order-card');
        const id = card.dataset.id;
        orders = orders.filter(o=>o.id!==id);
        await saveOrders();
        await fsDeleteOrder(id);
        renderHistory();
        toast('已刪除訂單');
      });
    });
  }

  // ================= 今日結帳 =================
  function renderDaily(){
    const todays = orders.filter(o=>isToday(o.time));

    // 今日售出品項彙總
    const itemMap = {};
    todays.forEach(o=>{
      o.lines.forEach(l=>{
        if(!itemMap[l.name]) itemMap[l.name] = { name:l.name, qty:0, subtotal:0 };
        itemMap[l.name].qty += l.qty;
        itemMap[l.name].subtotal += l.price * l.qty;
      });
    });
    const itemRows = Object.values(itemMap).sort((a,b)=> a.name.localeCompare(b.name));

    const itemsListEl = $('#dailyItemsList');
    if(itemRows.length === 0){
      itemsListEl.innerHTML = '<div class="history-empty">今天還沒有賣出任何東西。</div>';
    } else {
      itemsListEl.innerHTML = '<div class="daily-card">' + itemRows.map(it=>`
        <div class="daily-row">
          <span class="dr-label">${escapeHtml(it.name)} × ${it.qty}</span>
          <span class="dr-value">${fmt(it.subtotal)}</span>
        </div>
      `).join('') + '</div>';
    }

    // 收款方式明細（若該筆有找零，依現金/匯款的比例扣除找零，避免把找零也算成收入）
    let depositCashTotal = 0, depositTransferTotal = 0, settleCashTotal = 0, settleTransferTotal = 0, unpaidTotal = 0;
    todays.forEach(o=>{
      depositCashTotal += o.depositCashAmt || 0;
      depositTransferTotal += o.depositTransferAmt || 0;

      let cashPart = o.cash || 0;
      let transferPart = o.transfer || 0;
      const changeAmt = o.change || 0;
      if(changeAmt > 0){
        const receivedSum = cashPart + transferPart;
        if(receivedSum > 0){
          const keepRatio = Math.max(receivedSum - changeAmt, 0) / receivedSum;
          cashPart *= keepRatio;
          transferPart *= keepRatio;
        }
      }
      settleCashTotal += cashPart;
      settleTransferTotal += transferPart;
      unpaidTotal += o.unpaid || 0;
    });

    const paymentListEl = $('#dailyPaymentList');
    paymentListEl.innerHTML = `
      <div class="daily-card">
        <div class="daily-row"><span class="dr-label">訂金（現金）</span><span class="dr-value">${fmt(depositCashTotal)}</span></div>
        <div class="daily-row"><span class="dr-label">訂金（匯款）</span><span class="dr-value">${fmt(depositTransferTotal)}</span></div>
        <div class="daily-row"><span class="dr-label">現場結清（現金）</span><span class="dr-value">${fmt(settleCashTotal)}</span></div>
        <div class="daily-row"><span class="dr-label">現場結清（匯款）</span><span class="dr-value">${fmt(settleTransferTotal)}</span></div>
      </div>
    `;

    // 今日總計
    const totalCash = depositCashTotal + settleCashTotal;
    const totalTransfer = depositTransferTotal + settleTransferTotal;
    const totalIncome = totalCash + totalTransfer + unpaidTotal;

    const totalsListEl = $('#dailyTotalsList');
    totalsListEl.innerHTML = `
      <div class="daily-card">
        <div class="daily-row total"><span class="dr-label">總現金金額</span><span class="dr-value">${fmt(totalCash)}</span></div>
        <div class="daily-row total"><span class="dr-label">總匯款金額</span><span class="dr-value">${fmt(totalTransfer)}</span></div>
        <div class="daily-row unpaid"><span class="dr-label">未收尾款</span><span class="dr-value">${fmt(unpaidTotal)}</span></div>
        <div class="daily-row income"><span class="dr-label">總收入</span><span class="dr-value">${fmt(totalIncome)}</span></div>
      </div>
    `;

    $('#dailyStatCount').textContent = todays.length;
    $('#dailyStatIncome').textContent = fmt(totalIncome);
    $('#dailyStatUnpaid').textContent = fmt(unpaidTotal);
  }

  // ---------- init ----------
  (async function init(){
    await loadAll();
    if(divisions.length) activeDivisionId = divisions[0].id;
    renderDivisionChips();
    renderCategoryChips();
    renderItemGrid();
    renderDivisionSettings();
    renderCart();
    renderHistory();
    renderDaily();

    // 連接 Firebase，成功後訂閱即時同步（其他裝置的變動會自動反映在這裡）
    await initFirebase();
    if(fbReady){
      subscribeCatalog();
      subscribeOrders();
    }
  })();
})();
</script>
